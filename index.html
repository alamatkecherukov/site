<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .block { background: white; padding: 20px; margin: 10px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div id="root">Загрузка...</div>

    <script>
        fetch('data.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                let html = '<h1>📦 Сайт</h1>';

                // Показываем все блоки из корневого "blocks"
                if (data.blocks && data.blocks.length > 0) {
                    data.blocks.forEach(b => {
                        html += `<div class="block"><b>${b.type}</b>: ${b.title || 'без названия'}</div>`;
                    });
                } else {
                    html += '<p>❌ Нет блоков в data.blocks</p>';
                }

                // Показываем, что есть в pages
                if (data.pages) {
                    html += '<hr><h3>Страницы:</h3>';
                    Object.keys(data.pages).forEach(p => {
                        const count = data.pages[p].blocks ? data.pages[p].blocks.length : 0;
                        html += `<p>📄 ${p}: ${count} блоков</p>`;
                    });
                }

                // Показываем шапку
                if (data.header) {
                    html += `<hr><h3>Шапка:</h3><p>Логотип: ${data.header.logo || 'нет'}</p>`;
                }

                document.getElementById('root').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('root').innerHTML = '❌ Ошибка: ' + err.message;
            });
    </script>
</body>
</html>
