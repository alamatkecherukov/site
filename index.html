<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мой сайт</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', Arial, sans-serif; background: #f5f5f5; color: #1C2A24; line-height: 1.6; min-height: 100vh; transition: background 0.5s; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 20px; color: #999; flex-direction: column; gap: 12px; }
        .loading .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #2F5E52; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .block { margin: 16px 0; border-radius: 16px; overflow: hidden; transition: 0.3s; }
        .block-inner { padding: 32px 24px; }

        .block-header { background: #ffffff; border-bottom: 1px solid rgba(0,0,0,0.06); border-radius: 16px 16px 0 0; }
        .block-header .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .block-header .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #2F5E52; cursor: pointer; }
        .block-header .logo span { color: #A06A4C; }
        .block-header .nav { display: flex; gap: 24px; font-weight: 500; font-size: 14px; flex-wrap: wrap; }
        .block-header .nav button { background: none; border: none; color: #1C2A24; cursor: pointer; font-size: 14px; font-weight: 500; font-family: 'Inter', Arial, sans-serif; padding: 4px 0; transition: color 0.3s; position: relative; }
        .block-header .nav button:hover { color: #2F5E52; }
        .block-header .nav button.active { color: #2F5E52; }
        .block-header .nav button.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: #2F5E52; border-radius: 2px; }
        .block-header .header-btn { background: #EBC8A1; padding: 10px 28px; border-radius: 40px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 16px rgba(235,200,161,0.3); text-decoration: none; color: #1C2A24; display: inline-block; }
        .block-header .header-btn:hover { transform: scale(1.04); box-shadow: 0 6px 24px rgba(235,200,161,0.5); }

        .block-hero { text-align: center; border-radius: 16px; }
        .block-hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; margin-bottom: 12px; }
        .block-hero p { font-size: 18px; opacity: 0.8; }

        .block-grid { background: #ffffff; border-radius: 16px; }
        .block-grid .grid-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .block-grid .grid { display: grid; gap: 20px; margin-top: 20px; }
        .block-grid .grid-4 { grid-template-columns: repeat(4,1fr); }
        .block-grid .grid-3 { grid-template-columns: repeat(3,1fr); }
        .block-grid .grid-2 { grid-template-columns: repeat(2,1fr); }
        .block-grid .grid-item { background: #F6F3E9; padding: 24px 16px; border-radius: 16px; text-align: center; transition: 0.3s; }
        .block-grid .grid-item:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .block-grid .grid-item .icon { font-size: 36px; display: block; margin-bottom: 8px; }
        .block-grid .grid-item h4 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .block-grid .grid-item p { font-size: 13px; color: #4a5a54; }

        .block-article { background: #ffffff; border-radius: 16px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .block-article .article-img { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
        .block-article .article-body { flex: 1; }
        .block-article .article-body h3 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .block-article .article-body p { color: #4a5a54; font-size: 14px; }
        .block-article .article-body a { display: inline-block; margin-top: 8px; color: #2F5E52; font-weight: 600; text-decoration: none; }
        .block-article .article-body a:hover { margin-left: 4px; }

        .block-video { background: #ffffff; border-radius: 16px; }
        .block-video .video-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .block-video .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; }
        .block-video .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px; border: none; }

        .block-footer { background: #1C2A24; border-radius: 16px; color: #d4d4d0; }
        .block-footer .footer-inner { text-align: center; padding: 32px 24px; }
        .block-footer .footer-socials { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        .block-footer .footer-socials a { color: #d4d4d0; text-decoration: none; opacity: 0.6; font-size: 14px; transition: 0.3s; }
        .block-footer .footer-socials a:hover { opacity: 1; color: #EBC8A1; }
        .block-footer .footer-text { font-size: 13px; opacity: 0.5; }

        /* ===== ФОТО-КНОПКА ===== */
        .block-photo-button .grid-item {
            padding: 0;
            overflow: hidden;
            cursor: pointer;
            background: #ffffff;
            border-radius: 16px;
            transition: 0.3s;
        }
        .block-photo-button .grid-item:hover {
            transform: translateY(-6px);
        }
        .block-photo-button .grid-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .block-photo-button .grid-item .img-wrap {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .block-photo-button .grid-item .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }
        .block-photo-button .grid-item:hover .img-wrap img {
            transform: scale(1.03);
        }

        /* ===== ТЕКСТОВЫЙ БЛОК ===== */
        .block-text { background: #ffffff; border-radius: 16px; }
        .block-text .text-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        .block-text .text-content { font-size: 16px; color: #4a5a54; line-height: 1.8; }

        .empty-state { text-align: center; padding: 80px 20px; color: #999; }
        .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: #555; margin-bottom: 8px; }
        .empty-state p { font-size: 16px; }
        .page-content { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .page-bg { min-height: 100vh; }

        @media (max-width: 820px) {
            .block-grid .grid-4 { grid-template-columns: repeat(2,1fr); }
            .block-grid .grid-3 { grid-template-columns: repeat(2,1fr); }
            .block-grid .grid-2 { grid-template-columns: 1fr 1fr; }
            .block-photo-button .grid-2 { grid-template-columns: 1fr 1fr; }
            .block-photo-button .grid-3 { grid-template-columns: repeat(2,1fr); }
            .block-header .header-content { flex-direction: column; align-items: stretch; }
            .block-header .nav { justify-content: center; }
            .block-header .header-btn { text-align: center; }
            .block-hero h1 { font-size: 32px; }
            .block-article { flex-direction: column; text-align: center; }
            .block-article .article-img { width: 100%; height: 180px; }
        }
        @media (max-width: 480px) {
            .block-grid .grid-4, .block-grid .grid-3, .block-grid .grid-2 { grid-template-columns: 1fr; }
            .block-photo-button .grid-2, .block-photo-button .grid-3 { grid-template-columns: 1fr; }
            .block-hero h1 { font-size: 26px; }
            .block-header .nav { gap: 14px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Загрузка сайта...</span>
        </div>
        <div id="content" style="display:none;"></div>
    </div>

    <script>
        let siteData = null;
        let currentPage = 'home';

        async function loadSite() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            let data = null;

            try {
                const resp = await fetch('data.json?t=' + Date.now());
                if (resp.ok) {
                    data = await resp.json();
                    console.log('✅ data.json загружен');
                } else {
                    throw new Error('HTTP ' + resp.status);
                }
            } catch (e) {
                console.warn('Ошибка загрузки:', e.message);
            }

            loading.style.display = 'none';
            content.style.display = 'block';

            if (!data) {
                content.innerHTML =
                    `<div class="container"><div class="empty-state"><h2>⚠️ Ошибка</h2><p>Не удалось загрузить data.json</p></div></div>`;
                return;
            }

            if (!data.pages) data.pages = { home: { blocks: [] } };
            if (!data.header) data.header = { logo: 'Мой сайт', showBtn: true, btnText: 'Связаться', btnLink: '#' };

            if (data.blocks && data.blocks.length > 0 && data.pages.home.blocks.length === 0) {
                data.pages.home.blocks = data.blocks;
            }

            siteData = data;
            renderSite();
        }

        function renderSite() {
            const container = document.getElementById('content');
            const page = siteData.pages[currentPage] || {};

            const bg = page.background || {};
            let bgStyle = '';
            if (bg.type === 'color') {
                bgStyle = `background-color: ${bg.value || '#f5f5f5'};`;
            } else if (bg.type === 'image' && bg.image) {
                bgStyle = `
                        background-image: url('${bg.image}');
                        background-size: ${bg.size || 'cover'};
                        background-position: ${bg.position || 'center'};
                        background-repeat: no-repeat;
                    `;
            }

            container.innerHTML = `
                    <div class="page-bg" style="${bgStyle}">
                        <div class="container">
                            ${renderHeader()}
                            <div class="page-content" id="pageContent">
                                ${renderPage(currentPage)}
                            </div>
                        </div>
                    </div>
                `;
            updateActiveNav();
        }

        function getHeader() {
            const page = siteData.pages[currentPage];
            if (page && page.blocks) {
                const headerBlock = page.blocks.find(b => b.type === 'header');
                if (headerBlock) return headerBlock;
            }
            const home = siteData.pages.home;
            if (home && home.blocks) {
                const headerBlock = home.blocks.find(b => b.type === 'header');
                if (headerBlock) return headerBlock;
            }
            return siteData.header || {};
        }

        function renderHeader() {
            const h = getHeader();
            const pageNames = { home: 'Главная', articles: 'Статьи', socials: 'Соцсети', about: 'О нас' };
            const pageKeys = Object.keys(siteData.pages);

            let navHTML = pageKeys.map(key => {
                const label = pageNames[key] || key;
                const active = key === currentPage ? 'active' : '';
                return `<button class="${active}" onclick="switchPage('${key}')">${label}</button>`;
            }).join('');

            let btnHTML = '';
            if (h.showBtn !== false) {
                btnHTML =
                    `<a href="${h.btnLink || '#'}" class="header-btn" style="background:${h.btnBgColor || '#EBC8A1'};color:${h.textColor || '#1C2A24'};">${h.btnText || 'Связаться'}</a>`;
            }

            return `
                    <div class="block block-header" style="background:${h.bgColor || '#ffffff'};color:${h.textColor || '#1C2A24'};">
                        <div class="block-inner header-content">
                            <div class="logo" onclick="switchPage('home')">${h.logo || 'Мой сайт'}<span>.</span></div>
                            <div class="nav">${navHTML}</div>
                            ${btnHTML}
                        </div>
                    </div>
                `;
        }

        function renderPage(pageKey) {
            const page = siteData.pages[pageKey];
            if (!page) {
                return `<div class="empty-state"><h2>📄 Страница не найдена</h2></div>`;
            }

            const blocks = page.blocks || [];
            if (blocks.length === 0) {
                return `<div class="empty-state"><h2>📄 Страница пуста</h2><p>Добавьте блоки через редактор.</p></div>`;
            }

            let html = '';
            blocks.forEach(block => {
                if (block.type === 'header') return;
                html += renderBlock(block);
            });
            return html;
        }

        function renderBlock(block) {
            const bg = block.background || {};
            let bgStyle = '';
            if (bg.type === 'color') {
                bgStyle = `background-color: ${bg.value || 'transparent'};`;
            } else if (bg.type === 'image' && bg.image) {
                bgStyle = `
                        background-image: url('${bg.image}');
                        background-size: ${bg.size || 'cover'};
                        background-position: ${bg.position || 'center'};
                        background-repeat: no-repeat;
                    `;
            }

            // ===== ТЕНЬ =====
            let shadowStyle = '';
            if (block.shadow && block.shadow !== 'none') {
                const intensity = block.shadow === 'small' ? '0 4px 20px' :
                                  block.shadow === 'medium' ? '0 8px 40px' :
                                  '0 16px 60px';
                const color = block.shadowColor || 'rgba(0,0,0,0.1)';
                shadowStyle = `box-shadow: ${intensity} ${color};`;
            }

            const styleAttr = `style="${bgStyle} ${shadowStyle}"`;

            switch (block.type) {
                case 'hero': return renderHero(block, styleAttr);
                case 'advantages': return renderGrid(block, 4, 'advantages', styleAttr);
                case 'services': return renderGrid(block, 3, 'services', styleAttr);
                case 'photo-button': return renderPhotoButtons(block, styleAttr);
                case 'text': return renderText(block, styleAttr);
                case 'article': return renderArticle(block, styleAttr);
                case 'video': return renderVideo(block, styleAttr);
                case 'footer': return renderFooter(block, styleAttr);
                default: return '';
            }
        }

        function renderHero(block, styleAttr) {
            return `<div class="block block-hero" ${styleAttr}>
                    <div class="block-inner">
                        <h1>${block.title || 'Заголовок'}</h1>
                        <p>${block.subtitle || 'Подзаголовок'}</p>
                    </div>
                </div>`;
        }

        function renderGrid(block, cols, type, styleAttr) {
            const items = block.items || [];
            let gridHTML = items.map(item => `
                        <div class="grid-item">
                            <span class="icon">${item.icon || '⭐'}</span>
                            <h4>${item.title || ''}</h4>
                            <p>${item.desc || ''}</p>
                        </div>
                    `).join('');

            const label = type === 'advantages' ? 'Преимущества' : 'Услуги';

            return `<div class="block block-grid" ${styleAttr}>
                    <div class="block-inner">
                        <h2 class="grid-title">${block.title || label}</h2>
                        <div class="grid grid-${cols}">${gridHTML}</div>
                    </div>
                </div>`;
        }

        function renderPhotoButtons(block, styleAttr) {
            const items = block.items || [];
            let gridHTML = items.map(item => `
                        <div class="grid-item">
                            <a href="${item.link || '#'}">
                                <div class="img-wrap">
                                    ${item.image ? `<img src="${item.image}" alt="">` : '<span style="color:#ccc;font-size:14px;">Нет картинки</span>'}
                                </div>
                            </a>
                        </div>
                    `).join('');

            const cols = Math.min(items.length, 3);
            return `<div class="block block-grid block-photo-button" ${styleAttr}>
                    <div class="block-inner">
                        <h2 class="grid-title">${block.title || 'Фото-кнопки'}</h2>
                        <div class="grid grid-${cols}">${gridHTML}</div>
                    </div>
                </div>`;
        }

        function renderText(block, styleAttr) {
            return `<div class="block block-text" ${styleAttr}>
                    <div class="block-inner">
                        ${block.title ? `<h2 class="text-title">${block.title}</h2>` : ''}
                        <div class="text-content">${block.content || ''}</div>
                    </div>
                </div>`;
        }

        function renderArticle(block, styleAttr) {
            return `<div class="block block-article" ${styleAttr}>
                    <div class="block-inner" style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;padding:24px;">
                        ${block.image ? `<img src="${block.image}" class="article-img" alt="">` : ''}
                        <div class="article-body">
                            <h3>${block.title || 'Статья'}</h3>
                            <p>${block.description || ''}</p>
                            <a href="${block.link || '#'}">Читать →</a>
                        </div>
                    </div>
                </div>`;
        }

        function renderVideo(block, styleAttr) {
            return `<div class="block block-video" ${styleAttr}>
                    <div class="block-inner">
                        <div class="video-title">${block.title || 'Видео'}</div>
                        <div class="video-wrap">
                            <iframe src="${block.url || ''}" allowfullscreen></iframe>
                        </div>
                    </div>
                </div>`;
        }

        function renderFooter(block, styleAttr) {
            let socialsHTML = '';
            if (block.socials) {
                socialsHTML = block.socials.map(s => `<a href="${s.url || '#'}">${s.platform || 'Соцсеть'}</a>`).join('');
            }
            return `<div class="block block-footer" ${styleAttr}>
                    <div class="block-inner footer-inner">
                        <div class="footer-socials">${socialsHTML}</div>
                        <div class="footer-text">${block.text || '© 2026 Мой сайт'}</div>
                    </div>
                </div>`;
        }

        function switchPage(pageKey) {
            if (!siteData.pages[pageKey]) return;
            currentPage = pageKey;
            renderSite();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateActiveNav() {
            const nav = document.querySelector('.nav');
            if (!nav) return;
            const btns = nav.querySelectorAll('button');
            const pageNames = { home: 'Главная', articles: 'Статьи', socials: 'Соцсети', about: 'О нас' };
            btns.forEach(btn => {
                const label = btn.textContent;
                const target = Object.keys(pageNames).find(k => pageNames[k] === label);
                if (target) {
                    btn.classList.toggle('active', target === currentPage);
                }
            });
        }

        loadSite();
    </script>
</body>
</html>
