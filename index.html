<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мой сайт</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #f5f5f5;
            color: #1C2A24;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 20px;
            color: #999;
            flex-direction: column;
            gap: 12px;
        }
        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #2F5E52;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .block {
            margin: 16px 0;
            border-radius: 16px;
        }
        .block-inner {
            padding: 32px 24px;
        }
        .block-header {
            background: #ffffff;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 16px 16px 0 0;
        }
        .block-header .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .block-header .logo {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #2F5E52;
        }
        .block-header .logo span {
            color: #A06A4C;
        }
        .block-header .nav {
            display: flex;
            gap: 24px;
            font-weight: 500;
            font-size: 14px;
            flex-wrap: wrap;
        }
        .block-header .nav a {
            color: #1C2A24;
            text-decoration: none;
            transition: color 0.3s;
        }
        .block-header .nav a:hover {
            color: #2F5E52;
        }
        .block-header .header-btn {
            background: #EBC8A1;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 16px rgba(235, 200, 161, 0.3);
            text-decoration: none;
            color: #1C2A24;
            display: inline-block;
        }
        .block-header .header-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 24px rgba(235, 200, 161, 0.5);
        }
        .block-hero {
            text-align: center;
            border-radius: 16px;
        }
        .block-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .block-hero p {
            font-size: 18px;
            opacity: 0.8;
        }
        .block-grid {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .block-grid .grid-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .block-grid .grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }
        .block-grid .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }
        .block-grid .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        .block-grid .grid-item {
            background: #F6F3E9;
            padding: 24px 16px;
            border-radius: 16px;
            text-align: center;
            transition: 0.3s;
        }
        .block-grid .grid-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        .block-grid .grid-item .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
        }
        .block-grid .grid-item h4 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .block-grid .grid-item p {
            font-size: 13px;
            color: #4a5a54;
        }
        .block-article {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .block-article .article-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .block-article .article-body {
            flex: 1;
        }
        .block-article .article-body h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .block-article .article-body p {
            color: #4a5a54;
            font-size: 14px;
        }
        .block-article .article-body a {
            display: inline-block;
            margin-top: 8px;
            color: #2F5E52;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .block-article .article-body a:hover {
            margin-left: 4px;
        }
        .block-video {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .block-video .video-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .block-video .video-wrap {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .block-video .video-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            border: none;
        }
        .block-footer {
            background: #1C2A24;
            border-radius: 16px;
            color: #d4d4d0;
        }
        .block-footer .footer-inner {
            text-align: center;
            padding: 32px 24px;
        }
        .block-footer .footer-socials {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .block-footer .footer-socials a {
            color: #d4d4d0;
            text-decoration: none;
            opacity: 0.6;
            font-size: 14px;
            transition: 0.3s;
        }
        .block-footer .footer-socials a:hover {
            opacity: 1;
            color: #EBC8A1;
        }
        .block-footer .footer-text {
            font-size: 13px;
            opacity: 0.5;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        .empty-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #555;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 16px;
        }
        .error-state {
            text-align: center;
            padding: 80px 20px;
            color: #c0392b;
        }
        .error-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-bottom: 8px;
        }
        @media (max-width: 820px) {
            .block-grid .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }
            .block-grid .grid-3 {
                grid-template-columns: repeat(2, 1fr);
            }
            .block-header .header-content {
                flex-direction: column;
                align-items: stretch;
            }
            .block-header .nav {
                justify-content: center;
            }
            .block-header .header-btn {
                text-align: center;
            }
            .block-hero h1 {
                font-size: 32px;
            }
            .block-article {
                flex-direction: column;
                text-align: center;
            }
            .block-article .article-img {
                width: 100%;
                height: 180px;
            }
        }
        @media (max-width: 480px) {
            .block-grid .grid-4,
            .block-grid .grid-3 {
                grid-template-columns: 1fr;
            }
            .block-hero h1 {
                font-size: 26px;
            }
            .block-header .nav {
                gap: 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Загрузка сайта...</span>
        </div>
        <div id="content" style="display:none;"></div>
    </div>

    <script>
        // ============================================================
        //  ЗАГРУЗКА DATA.JSON (с запасными путями)
        // ============================================================
        async function loadSite() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');

            // Список путей для проверки
            const paths = [
                'data.json',
                './data.json',
                '/data.json',
                window.location.pathname.replace(/\/[^/]*$/, '/') + 'data.json'
            ];

            let data = null;
            let lastError = null;

            for (const path of paths) {
                try {
                    console.log(`Пытаюсь загрузить: ${path}`);
                    const resp = await fetch(path + '?t=' + Date.now());
                    if (resp.ok) {
                        data = await resp.json();
                        console.log(`✅ Загружено: ${path}`);
                        break;
                    } else {
                        console.warn(`❌ Ошибка ${resp.status}: ${path}`);
                        lastError = `Ошибка ${resp.status}`;
                    }
                } catch (e) {
                    console.warn(`⚠️ Не удалось загрузить ${path}:`, e.message);
                    lastError = e.message;
                }
            }

            loading.style.display = 'none';
            content.style.display = 'block';

            if (data && data.blocks) {
                content.innerHTML = renderSite(data);
            } else if (data) {
                content.innerHTML = renderError('Файл data.json найден, но не содержит блоков.');
            } else {
                content.innerHTML = renderError(
                    'Не удалось загрузить data.json. Убедитесь, что файл лежит в той же папке, что и index.html.' +
                    '<br><small>Ошибка: ' + (lastError || 'неизвестная') + '</small>'
                );
            }
        }

        // ============================================================
        //  РЕНДЕР САЙТА
        // ============================================================
        function renderSite(data) {
            const blocks = data.blocks || [];
            if (blocks.length === 0) {
                return renderEmpty();
            }

            let html = '<div class="container">';
            blocks.forEach(block => {
                html += renderBlock(block);
            });
            html += '</div>';
            return html;
        }

        function renderBlock(block) {
            switch (block.type) {
                case 'header':
                    return renderHeader(block);
                case 'hero':
                    return renderHero(block);
                case 'advantages':
                    return renderGrid(block, 'advantages', 4);
                case 'services':
                    return renderGrid(block, 'services', 3);
                case 'article':
                    return renderArticle(block);
                case 'video':
                    return renderVideo(block);
                case 'footer':
                    return renderFooter(block);
                default:
                    return '';
            }
        }

        function renderHeader(block) {
            let btnHTML = '';
            if (block.showBtn !== false) {
                btnHTML = `<a href="${block.btnLink || '#'}" class="header-btn" style="background:${block.btnBgColor || '#EBC8A1'};color:${block.textColor || '#1C2A24'};">${block.btnText || 'Связаться'}</a>`;
            }
            return `
                    <div class="block block-header" style="background:${block.bgColor || '#ffffff'};color:${block.textColor || '#1C2A24'};">
                        <div class="block-inner header-content">
                            <div class="logo">${block.logo || 'Мой сайт'}<span>.</span></div>
                            <div class="nav">
                                <a href="#" style="color:${block.textColor || '#1C2A24'};">Главная</a>
                                <a href="#" style="color:${block.textColor || '#1C2A24'};">Статьи</a>
                                <a href="#" style="color:${block.textColor || '#1C2A24'};">О нас</a>
                            </div>
                            ${btnHTML}
                        </div>
                    </div>
                `;
        }

        function renderHero(block) {
            return `
                    <div class="block block-hero" style="background:${block.bgColor || '#f0f0f0'};color:${block.textColor || '#1C2A24'};">
                        <div class="block-inner">
                            <h1>${block.title || 'Заголовок'}</h1>
                            <p>${block.subtitle || 'Подзаголовок'}</p>
                        </div>
                    </div>
                `;
        }

        function renderGrid(block, type, cols) {
            const items = block.items || [];
            const label = type === 'advantages' ? 'Преимущества' : 'Услуги';
            let gridHTML = '';
            items.forEach(item => {
                gridHTML += `
                        <div class="grid-item">
                            <span class="icon">${item.icon || '⭐'}</span>
                            <h4>${item.title || ''}</h4>
                            <p>${item.desc || ''}</p>
                        </div>
                    `;
            });

            return `
                    <div class="block block-grid">
                        <div class="block-inner">
                            <h2 class="grid-title">${block.title || label}</h2>
                            <div class="grid grid-${cols}">
                                ${gridHTML}
                            </div>
                        </div>
                    </div>
                `;
        }

        function renderArticle(block) {
            return `
                    <div class="block block-article">
                        <div class="block-inner" style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;padding:24px;">
                            ${block.image ? `<img src="${block.image}" class="article-img" alt="">` : ''}
                            <div class="article-body">
                                <h3>${block.title || 'Статья'}</h3>
                                <p>${block.description || ''}</p>
                                <a href="${block.link || '#'}">Читать →</a>
                            </div>
                        </div>
                    </div>
                `;
        }

        function renderVideo(block) {
            return `
                    <div class="block block-video">
                        <div class="block-inner">
                            <div class="video-title">${block.title || 'Видео'}</div>
                            <div class="video-wrap">
                                <iframe src="${block.url || ''}" allowfullscreen></iframe>
                            </div>
                        </div>
                    </div>
                `;
        }

        function renderFooter(block) {
            let socialsHTML = '';
            if (block.socials) {
                block.socials.forEach(s => {
                    socialsHTML += `<a href="${s.url || '#'}">${s.platform || 'Соцсеть'}</a>`;
                });
            }
            return `
                    <div class="block block-footer" style="background:${block.bgColor || '#1C2A24'};color:${block.textColor || '#d4d4d0'};">
                        <div class="block-inner footer-inner">
                            <div class="footer-socials">${socialsHTML}</div>
                            <div class="footer-text">${block.text || '© 2026 Мой сайт'}</div>
                        </div>
                    </div>
                `;
        }

        function renderEmpty() {
            return `
                    <div class="container">
                        <div class="empty-state">
                            <h2>✨ Сайт пока пуст</h2>
                            <p>Добавьте блоки через редактор, и они появятся здесь.</p>
                            <p style="margin-top:12px;font-size:13px;color:#bbb;">Откройте editor.html и начните создавать!</p>
                        </div>
                    </div>
                `;
        }

        function renderError(msg) {
            return `
                    <div class="container">
                        <div class="error-state">
                            <h2>⚠️ Ошибка загрузки</h2>
                            <p>${msg}</p>
                            <p style="margin-top:12px;font-size:13px;color:#888;">
                                Проверьте, что файл <strong>data.json</strong> лежит в той же папке, что и index.html.
                            </p>
                            <p style="font-size:13px;color:#888;">
                                Откройте консоль браузера (F12) для подробностей.
                            </p>
                        </div>
                    </div>
                `;
        }

        // ============================================================
        //  ЗАПУСК
        // ============================================================
        loadSite();
    </script>
</body>
</html>
